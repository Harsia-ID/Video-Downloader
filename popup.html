<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    :root {
      --bg-glass: rgba(255, 255, 255, 0.75);
      --border-glass: rgba(255, 255, 255, 0.4);
      --text-main: #1d1d1f;
      --text-sub: #86868b;
      --accent: #0071e3;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      width: 380px; margin: 0; padding: 15px;
      background: linear-gradient(135deg, #e0eafc 0%, #cfdef3 100%);
      color: var(--text-main); overflow-x: hidden;
    }
    h2 { font-size: 18px; font-weight: 600; margin: 0 0 5px 0; text-align: center; }
    .filter-info { text-align: center; font-size: 10px; color: var(--text-sub); margin-bottom: 15px; }
    .category-title { font-size: 11px; font-weight: 700; color: var(--text-sub); text-transform: uppercase; margin: 15px 0 8px 5px; border-bottom: 1px solid var(--border-glass); padding-bottom: 4px; }
    .category-list { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 10px; }
    .media-card { background: var(--bg-glass); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid var(--border-glass); border-radius: 14px; padding: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.04); display: flex; align-items: center; gap: 12px; animation: slideUp 0.3s ease; }
    @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .thumbnail-box { width: 45px; height: 45px; border-radius: 8px; background: #f5f5f7; display: flex; justify-content: center; align-items: center; overflow: hidden; flex-shrink: 0; }
    .thumbnail-icon { font-size: 20px; }
    .details { flex-grow: 1; min-width: 0; }
    .title { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 4px; }
    .meta { font-size: 11px; color: var(--text-sub); display: flex; gap: 8px; align-items: center; }
    .badge { background: rgba(0, 113, 227, 0.1); color: var(--accent); padding: 2px 6px; border-radius: 4px; font-weight: 500; }
    .badge.warn { background: rgba(255, 59, 48, 0.1); color: #ff3b30; }
    .btn-download { background: var(--accent); color: white; border: none; width: 32px; height: 32px; border-radius: 16px; cursor: pointer; display: flex; justify-content: center; align-items: center; flex-shrink: 0; transition: transform 0.2s; }
    .btn-download:hover { transform: scale(1.05); }
    .btn-download:disabled { background: #ccc; cursor: not-allowed; transform: none; }
    .btn-download svg { width: 14px; height: 14px; fill: currentColor; }
    #status { text-align: center; font-size: 12px; color: var(--text-sub); margin-top: 10px; }
    .footer { text-align: center; font-size: 10px; color: #9ca3af; margin-top: 20px; font-weight: 500; letter-spacing: 0.5px; }
  </style>
</head>
<body>
  <h2>Media Scanner</h2>
  <div class="filter-info">Smart Filter & Auto-Bypass Ready</div>
  <div id="media-container"></div>
  <div id="status">Memindai halaman secara real-time...</div>
  
  <div class="footer">Developed by harsiadev</div>
  <script src="popup.js"></script>
</body>
</html>
